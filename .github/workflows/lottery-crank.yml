# Settles lottery draws after sales close (close_sales → VRF → settle).
# Hobby Vercel cannot run frequent crons; this workflow calls the authenticated
# API route. Homepage visitors also crank when the timer ends (server action).
#
# Repo secret: CRON_SECRET (same value as Vercel CRON_SECRET / LOTTERY_CRON_SECRET)
# Optional repo variable: LOTTERY_CRANK_URL (default https://www.slotto.gg/api/lottery/crank)

name: Lottery crank

on:
  schedule:
    # GitHub Actions minimum interval for scheduled workflows is 5 minutes.
    - cron: "*/5 * * * *"
  workflow_dispatch:

concurrency:
  group: lottery-crank
  cancel-in-progress: false

jobs:
  crank:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - name: Crank pending draws on production
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          LOTTERY_CRANK_URL: ${{ vars.LOTTERY_CRANK_URL }}
        run: |
          if [ -z "${CRON_SECRET}" ]; then
            echo "Missing GitHub secret CRON_SECRET (must match Vercel)." >&2
            exit 1
          fi
          URL="${LOTTERY_CRANK_URL:-https://www.slotto.gg/api/lottery/crank}"

          crank_once() {
            local label="$1"
            MAX_ATTEMPTS=3
            ATTEMPT=1
            while [ "$ATTEMPT" -le "$MAX_ATTEMPTS" ]; do
              echo "${label} GET ${URL} (attempt ${ATTEMPT}/${MAX_ATTEMPTS})"
              HTTP=$(curl -sS -L -w "\n%{http_code}" -X GET \
                -H "Authorization: Bearer ${CRON_SECRET}" \
                -H "Accept: application/json" \
                --max-time 120 \
                "${URL}")
              BODY=$(echo "$HTTP" | head -n -1)
              CODE=$(echo "$HTTP" | tail -n 1)
              echo "$BODY"
              if [ "$CODE" -ge 200 ] && [ "$CODE" -lt 300 ]; then
                if echo "$BODY" | grep -q '"retry"[[:space:]]*:[[:space:]]*true'; then
                  if [ "$ATTEMPT" -lt "$MAX_ATTEMPTS" ]; then
                    echo "Rate limited — waiting 30s before retry" >&2
                    sleep 30
                    ATTEMPT=$((ATTEMPT + 1))
                    continue
                  fi
                fi
                return 0
              fi
              if [ "$ATTEMPT" -lt "$MAX_ATTEMPTS" ]; then
                echo "HTTP ${CODE} — waiting 30s before retry" >&2
                sleep 30
                ATTEMPT=$((ATTEMPT + 1))
                continue
              fi
              echo "HTTP ${CODE}" >&2
              return 22
            done
          }

          crank_once "Pass 1"
          # Switchboard VRF often needs a second pass (reveal + settle).
          echo "Waiting 45s for VRF before second crank pass…"
          sleep 45
          crank_once "Pass 2"
