# Settles lottery draws after sales close (close_sales → VRF → settle).
# Hobby Vercel cannot run frequent crons; this workflow calls the authenticated
# API route instead. Do NOT enable public visitor crank in production.
#
# Repo secret: CRON_SECRET (same value as Vercel CRON_SECRET / LOTTERY_CRON_SECRET)
# Optional repo variable: LOTTERY_CRANK_URL (default https://www.slotto.gg/api/lottery/crank)

name: Lottery crank

on:
  schedule:
    # GitHub Actions minimum interval for scheduled workflows is 5 minutes.
    - cron: "*/5 * * * *"
  workflow_dispatch:

concurrency:
  group: lottery-crank
  cancel-in-progress: false

jobs:
  crank:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Crank pending draws on production
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          LOTTERY_CRANK_URL: ${{ vars.LOTTERY_CRANK_URL }}
        run: |
          if [ -z "${CRON_SECRET}" ]; then
            echo "Missing GitHub secret CRON_SECRET (must match Vercel)." >&2
            exit 1
          fi
          URL="${LOTTERY_CRANK_URL:-https://www.slotto.gg/api/lottery/crank}"
          echo "POST ${URL}"
          curl -sfS -X GET \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            -H "Accept: application/json" \
            --max-time 120 \
            "${URL}"
