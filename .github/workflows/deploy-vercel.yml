# Deploys production on every push to main via a Vercel Deploy Hook.
# Use this when Vercel's GitHub integration stops creating deployments.
#
# One-time setup:
# 1. Vercel → slotto → Settings → Git → Deploy Hooks → Create Hook
#    Name: github-main | Branch: main → copy URL
# 2. GitHub → 1000s-sol/slotto → Settings → Secrets and variables → Actions
#    New secret: VERCEL_DEPLOY_HOOK = paste hook URL
# 3. Push to main (this workflow runs)
#
# If you reconnect Vercel Git later, you may get two deploys per push —
# disable one path (remove this workflow or turn off auto-deploy in Vercel Git).

name: Deploy to Vercel

on:
  push:
    branches: [main]

concurrency:
  group: vercel-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Vercel production build
        env:
          VERCEL_DEPLOY_HOOK: ${{ secrets.VERCEL_DEPLOY_HOOK }}
        run: |
          if [ -z "$VERCEL_DEPLOY_HOOK" ]; then
            echo "::error::Missing GitHub secret VERCEL_DEPLOY_HOOK. See .github/workflows/deploy-vercel.yml"
            exit 1
          fi
          curl -fsS -X POST "$VERCEL_DEPLOY_HOOK"
          echo "Deploy hook accepted — check Vercel Deployments."
